---
name: Build and Publish Adder

on:
  # Trigger on tags starting with 'v' (e.g., v1.0, v2.1.3)
  push:
    tags:
      - 'v*'
  # Allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # We append /adder to differentiate it from other exercises in the same repo
  IMAGE_NAME: ${{ github.repository }}/adder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Crucial: set the context to the specific folder
          context: ./8_bit_adder
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
